<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS | Neural Interface v1.0</title>

    <!-- 전용 라이브러리 (버전 고정으로 안정성 확보) -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.9.1/dist/three-spritetext.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>

    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #00f0ff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* 상단 UI 레이어 */
        #ui-header {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 100;
            pointer-events: none;
            border-left: 3px solid #00f0ff;
            padding-left: 15px;
        }

        .glitch-text {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00f0ff;
        }

        .status-box {
            font-size: 11px;
            margin-top: 5px;
            background: rgba(0, 240, 255, 0.1);
            padding: 2px 8px;
            display: inline-block;
        }

        /* 커스텀 툴팁 스타일 (호버 시 나타나는 박스) */
        .scene-tooltip {
            background: rgba(0, 20, 30, 0.9) !important;
            border: 1px solid #00f0ff !important;
            border-radius: 0px !important;
            color: #fff !important;
            padding: 10px !important;
            font-family: 'Malgun Gothic', sans-serif !important;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }
    </style>
</head>

<body>

    <div id="ui-header">
        <div class="glitch-text">IRIS_NEURAL_ARCHIVE</div>
        <div id="status-text" class="status-box">SYSTEM: STANDBY...</div>
    </div>

    <div id="3d-graph"></div>

    <script>
        let irisGraph;
        let lastDataHash = "";

        // 1. 그래프 엔진 초기화
        function initNeuralInterface() {
            const elem = document.getElementById('3d-graph');

            // 1. 먼저 인스턴스를 생성하여 변수에 할당합니다.
            irisGraph = ForceGraph3D()(elem);

            // 2. 그 다음 설정을 체이닝하되, 중간에 반환값이 바뀌는 메서드는 따로 처리합니다.
            irisGraph
                .backgroundColor('#000000')
                .showNavInfo(false)
                .nodeThreeObject(node => {
                    if (typeof SpriteText !== 'undefined') {
                        const sprite = new SpriteText(node.id);
                        sprite.color = node.valence > 0.1 ? '#00ffff' : node.valence < -0.1 ? '#ff00ff' : '#ffffff';
                        sprite.textHeight = 7;
                        sprite.fontWeight = 'bold';
                        return sprite;
                    }
                })
                .nodeLabel(node => `
                    <div style="padding: 10px; border: 1px solid #00f0ff; background: rgba(0,0,0,0.8);">
                        <strong style="color: #00f0ff;">${node.id}</strong><br/>
                        <span style="color: #eee; font-size: 12px;">${node.desc}</span>
                    </div>
                `)
                .linkWidth(link => (link.intensity * 1.2) + 0.5)
                .linkColor(link => link.valence > 0.1 ? '#00ffff' : link.valence < -0.1 ? '#ff00ff' : '#444444')
                .linkDirectionalParticles(link => Math.floor((link.importance || 1) * 3))
                .linkDirectionalParticleSpeed(link => (link.intensity || 1) * 0.005)
                .linkLabel(link => `<div style="color: #00f0ff; background: rgba(0,0,0,0.7); padding: 4px;">${link.label || 'LINKED'}</div>`);

            // 3. 물리 엔진 설정 (반환값이 달라지는 지점은 변수 할당 없이 실행만 함)
            irisGraph.d3Force('charge').strength(-150);

            // 초기 데이터 로드 시작
            syncBrainData();
        }

        // 2. 백엔드와 데이터 동기화 (깜빡임 방지 적용)
        async function syncBrainData() {
            if (!irisGraph) return;

            try {
                const response = await fetch('/api/brain');
                if (!response.ok) throw new Error('Network status error');

                const data = await response.json();

                // 데이터 무결성 처리 (ID를 모두 문자열로 강제 변환)
                const cleanData = {
                    nodes: (data.nodes || []).map(n => ({ ...n, id: String(n.id) })),
                    links: (data.links || []).map(l => ({
                        ...l,
                        source: String(l.source),
                        target: String(l.target)
                    }))
                };

                // 변경사항이 있을 때만 갱신 (WebGL 깜빡임 방지 핵심)
                const currentHash = JSON.stringify(cleanData);
                if (currentHash !== lastDataHash) {
                    irisGraph.graphData(cleanData);
                    lastDataHash = currentHash;
                    document.getElementById('status-text').innerText = "SYSTEM: NEURAL_SYNC_ACTIVE";
                    console.log("🧠 [SYNC] Brain map updated.");
                }
            } catch (err) {
                console.error("❌ [ERROR] Brain link failed:", err);
                document.getElementById('status-text').innerText = "SYSTEM: CONNECTION_REFUSED";
            }
        }

        // 3. 브라우저 로드 시 실행
        window.onload = () => {
            initNeuralInterface();
            // 2초 간격으로 백엔드 감시
            setInterval(syncBrainData, 2000);
        };

        // 창 크기 대응
        window.addEventListener('resize', () => {
            if (irisGraph) {
                irisGraph.width(window.innerWidth);
                irisGraph.height(window.innerHeight);
            }
        });
    </script>
</body>

</html>
